services:
  redis:
    image: redis:7
    ports: ["6379:6379"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: jobqueue
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      retries: 10

  api:
    build: .
    command: /api
    ports: ["8080:8080"]
    environment:
      REDIS_ADDR: redis:6379
      DATABASE_URL: postgres://postgres:devpass@postgres:5432/jobqueue
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: /worker
    environment:
      REDIS_ADDR: redis:6379
      DATABASE_URL: postgres://postgres:devpass@postgres:5432/jobqueue
      WORKER_COUNT: "4"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started